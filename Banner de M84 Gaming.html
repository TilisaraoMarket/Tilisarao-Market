<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M84X Hardware Banner</title>
    <style>
        .banner-container {
            width: 100%;
            max-width: 1200px;
            height: 400px;
            margin: 20px auto;
            position: relative;
            overflow: hidden;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: transform 0.3s ease;
        }

        .banner-container:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        }

        .banner-link {
            text-decoration: none;
            display: block;
            width: 100%;
            height: 100%;
        }

        .banner {
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, #1a1a1a, #333333);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            position: relative;
            animation: gradientBG 10s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .banner::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&w=1200&q=80') center/cover;
            opacity: 0.1;
        }

        .banner-title {
            font-size: 3.5em;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            animation: slideIn 1s ease-out;
            color: #00ff00;
        }

        .banner-subtitle {
            font-size: 1.5em;
            margin-bottom: 30px;
            text-align: center;
            animation: slideIn 1s ease-out 0.3s backwards;
            color: #ffffff;
        }

        .cta-button {
            padding: 15px 40px;
            font-size: 1.2em;
            background-color: #00ff00;
            color: #000000;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.3s, background-color 0.3s;
            animation: bounceIn 1s ease-out 0.6s backwards;
            font-weight: bold;
        }

        .banner-link:hover .cta-button {
            background-color: #00cc00;
            transform: scale(1.05);
        }

        .tech-icon {
            font-size: 40px;
            margin-bottom: 20px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes slideIn {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        @media (max-width: 768px) {
            .banner-container {
                height: 300px;
            }
            .banner-title {
                font-size: 2em;
            }
            .banner-subtitle {
                font-size: 1.2em;
            }
            .cta-button {
                padding: 12px 30px;
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <div class="banner-container">
        <a href="https://www.m84x-hardware.com.ar/" class="banner-link" target="_blank">
            <div class="banner">
                <div class="tech-icon">⚡</div>
                <h1 class="banner-title">M84X HARDWARE</h1>
                <p class="banner-subtitle">Tu Destino Tecnológico de Confianza</p>
                <div class="cta-button">INGRESAR A LA TIENDA</div>
            </div>
        </a>
    </div>
</body>
</html>
